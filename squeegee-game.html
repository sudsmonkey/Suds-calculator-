<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Squeege Master 3000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6ECDE;
    --mint:#9ED9C0;
    --coral:#F56E64;
    --deepcoral:#A6382E;
    --ink:#1b2b34;
    --paper:#F6ECDE;
    --brass:#F56E64;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:linear-gradient(180deg,#9ED9C0,#5f9c81);
    font-family:'Georgia',serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    touch-action:none;
    overscroll-behavior:none;
    overflow:hidden;
  }
  .stage{
    width:min(96vw,480px);
    display:flex;flex-direction:column;align-items:center;
    gap:12px;
    padding:10px 14px 16px;
  }
  h1{
    margin:0;font-size:26px;color:var(--deepcoral);font-weight:400;
    font-family:'Anton',sans-serif;text-transform:uppercase;
    letter-spacing:0.5px;font-style:italic;
    text-align:center;
  }
  .hud{
    display:flex;align-items:center;gap:14px;
    color:var(--ink);font-size:13px;
  }
  .hud .bananas{display:flex;align-items:center;gap:4px;}
  .hud .bananas img{width:18px;height:18px;object-fit:contain;border-radius:3px;}
  .hud button{
    font-family:inherit;font-size:12px;padding:2px 12px;border-radius:16px;
    border:1px solid var(--brass);background:#D9D9D9;color:var(--brass);
  }
  .toast{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);
    background:#6bab90;color:var(--ink);
    padding:24px 32px;border-radius:14px;font-size:20px;font-weight:700;
    line-height:1.5;min-width:220px;
    opacity:0;pointer-events:none;transition:all .25s;text-align:center;
    border:1px solid #4d8a71;z-index:10;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .box{
    position:relative;
    padding:10px;
    background:linear-gradient(160deg,#F56E64,#e8867e);
    border-radius:10px;
    box-shadow:0 8px 22px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.06);
    max-width:100%;
  }
  #glassCanvas{
    display:block;border-radius:3px;
    background:linear-gradient(180deg,#F6ECDE,#efe1cc);
    touch-action:none;
    max-width:100%; height:auto;
  }
  #toggleCanvas{
    display:block;border-radius:3px;
    background:radial-gradient(circle at 50% 40%,#4a1a14,#240c09);
    touch-action:none;
    max-width:100%; height:auto;
  }

  /* landscape: keep same top-to-bottom stacking, just use the extra width */
  @media (orientation: landscape){
    .stage{
      width:min(92vw,620px);
      flex-direction:column;
      gap:8px;
      padding:6px 16px;
    }
    h1{ display:none; }
    .hud{ font-size:11px; gap:8px; }
    .box{ padding:8px; }
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <h1>Squeege Master 3000</h1>
  <div style="display:flex;gap:8px;justify-content:center;width:100%;">
    <button id="applicatorBtn" aria-label="Applicator" style="margin:0;padding:2px 12px;background:#D9D9D9;border:3px solid #A6382E;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;">
      <canvas id="applicatorIcon" width="64" height="64" style="width:46px;height:46px;"></canvas>
    </button>
    <button id="squeegeeBtn" aria-label="Squeegee" style="margin:0;padding:2px 12px;background:#D9D9D9;border:3px solid #F56E64;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;">
      <canvas id="squeegeeIcon" width="64" height="64" style="width:46px;height:46px;"></canvas>
    </button>
  </div>

  const applicatorIconCanvas = document.getElementById('applicatorIcon');

    const aCtx = applicatorIconCanvas.getContext('2d');
    aCtx.clearRect(0,0,64,64);
    aCtx.save();
    aCtx.translate(32, 32);
    aCtx.scale(scale, scale);
    drawApplicatorTool(aCtx, 0, -12.5, 0); // -12.5 centers the foam+handle+grip assembly

    sCtx.save();
    sCtx.translate(32, 32);
    sCtx.scale(scale, scale);
    drawSqueegeeTool(sCtx, 0, -8.5, 0); // -8.5 centers the blade+handle+grip assembly

  }

  const BLADE_LEN_RATIO = 0.28; // blade length as a fraction of glass width, so it scales with box size
  const ANGLE_LIMIT = 80;
  const SENSITIVITY = 0.45;   // degrees of S per degree of virtual spin
  const PIXELS_TO_DEG = 2.0;  // degrees the wheel spins per pixel of horizontal swipe
  const ZONE_GAP = 10;

  // ---- all of this is recomputed by layout() whenever orientation/size changes ----
  let GW, GH, TW, TH, BLADE_LEN;
  let midX, wheelCx, wheelCy, CAP_W, CAP_H;
  let padLeft, padRight, padTop, padBottom, padCx, padCy;
  let SM_SCALE_X, SM_SCALE_Y;

  let sx, sy;             // squeegee position
  let angleDeg = 0;        // S: accumulated, clamped blade angle
  let spinTotal = 0;       // wheel: cumulative rotation, purely cosmetic
  let padVx, padVy;        // move-pad's drawn dot position

  // ---- game state: dirt, cleaning, scoring ----
  const COLS = 26, ROWS = 16;
  let dirtSeed = [];       // randomized grime speckle positions, regenerated per window
  let bananaCount = 0; // persists across window resets — the actual currency
  let windowComplete = false; // true once the closeout position has been hit — locks the squeegee in place
  let squeegeeStartTime = null; // when the squeegee tool was first selected this window — timing starts here
  let bubbles = [];        // every suds bubble on the glass: 'stuck' (sitting where it was applied) or 'falling' (released by the squeegee, obeying gravity)

  let currentTool = 'applicator';
  let suds = [];
  let sudsyCellCount = 0;     // how many cells currently hold any suds, kept in sync instead of scanning the grid
  let cleaned = [];           // cleaned[r][c] — has the squeegee ever wiped this cell before
  let usefulStrokes = 0;      // blade-cells that were freshly loaded with suds
  let wastedStrokes = 0;      // blade-cells that were dry ground the blade had already left and come back to
  const MAX_SUDS = 4; // number of applicator strokes to max out suds

  function newWindow(){
    suds = [];
    cleaned = [];
    for(let r=0;r<ROWS;r++){
      const sudsRow = [];
      const cleanedRow = [];
      for(let c=0;c<COLS;c++){
        sudsRow.push(0);
        cleanedRow.push(false);
      }
      suds.push(sudsRow);
      cleaned.push(cleanedRow);
    }
    sudsyCellCount = 0;
    usefulStrokes = 0;
    wastedStrokes = 0;
    dirtSeed = [];
    for(let i=0;i<260;i++){
      dirtSeed.push({
        x: Math.random()*GW, y: Math.random()*GH,
        r: 4+Math.random()*(GW*0.04), a: 0.5+Math.random()*0.35
      });
    }
    windowComplete = false;
    squeegeeStartTime = null;
    bubbles = [];
    sx = GW/2; sy = GH/2;
    angleDeg = 0; spinTotal = 0;
    padVx = padCx; padVy = padCy;
    lastSweepSx = null; lastSweepSy = null; lastSweepAngle = null;
    moveStrokeId = 0;
    lastTouchedStroke = new Map();
    currentTool = 'applicator';
    document.getElementById('applicatorBtn').style.border = '3px solid #A6382E';
    document.getElementById('squeegeeBtn').style.border = '3px solid #F56E64';
    updateHud();
    showToast('', false);
  }

  function cellAt(px,py){
    const c = Math.floor(px/(GW/COLS)), r = Math.floor(py/(GH/ROWS));
    if(c<0||c>=COLS||r<0||r>=ROWS) return null;
    return {r,c};
  }

  let lastSweepSx = null, lastSweepSy = null, lastSweepAngle = null;
  let moveStrokeId = 0;             // increments each time the move-pad is freshly pressed (a new "swipe")
  let lastTouchedStroke = new Map(); // cellKey -> which stroke last had the blade over it
  const STROKE_FORGIVENESS = 1; // resuming with the very next push after a release is free (the pad's travel is limited); going further back than that is a real revisit

  function sweepBlade(){
    const isFirstFrame = lastSweepSx === null;
    const dy = isFirstFrame ? 0 : sy - lastSweepSy;
    const dx = isFirstFrame ? 0 : sx - lastSweepSx;
    const moved = isFirstFrame
      || Math.abs(sx-lastSweepSx) > 0.05
      || Math.abs(dy) > 0.05
      || Math.abs(angleDeg-lastSweepAngle) > 0.05;
    lastSweepSx = sx; lastSweepSy = sy; lastSweepAngle = angleDeg;
    if(!moved) return;
    if(currentTool === 'squeegee' && dy < -0.05) return;

    const cw = GW/COLS, ch = GH/ROWS;
    const currentCells = new Set();
    const clearedCells = new Set();
    const [p1,p2] = bladeEndpoints(sx,sy,angleDeg);
    const steps = 26;
    const EDGE_OFFSET = Math.max(4, GH*0.02);
    const hadSudsSomewhere = sudsyCellCount > 0; // was there still work to do when this frame started?
    for(let i=0;i<=steps;i++){
      const t = i/steps;
      const px = p1.x + (p2.x-p1.x)*t;
      const py = p1.y + (p2.y-p1.y)*t + EDGE_OFFSET;
      const cell = cellAt(px,py);
      if(!cell) continue;
      const key = cell.r+'_'+cell.c;
      if(currentCells.has(key)) continue;
      currentCells.add(key);

      if(currentTool === 'applicator'){
        // Increment suds up to max level, spawning one real bubble per increment
        if(suds[cell.r][cell.c] < MAX_SUDS){
          if(suds[cell.r][cell.c] === 0) sudsyCellCount++;
          suds[cell.r][cell.c]++;
          bubbles.push({
            x: px + (Math.random()-0.5)*cw*0.5,
            y: py + (Math.random()-0.5)*ch*0.5,
            r: 2.6 + Math.random()*2.4,
            vx: 0, vy: 0,
            state: 'stuck',
            cellR: cell.r, cellC: cell.c,
            alpha: 0.85 + Math.random()*0.15
          });
        }
      } else if(suds[cell.r][cell.c] > 0){
        // Squeegee: remove all suds in one stroke, queueing their bubbles to be released below.
        // Blade is genuinely "loaded" here — always counts as useful.
        usefulStrokes++;
        suds[cell.r][cell.c] = 0;
        sudsyCellCount--;
        cleaned[cell.r][cell.c] = true;
        clearedCells.add(key);
      } else if(cleaned[cell.r][cell.c] && hadSudsSomewhere){
        const lastStroke = lastTouchedStroke.get(key);
        if(lastStroke === undefined || moveStrokeId - lastStroke > STROKE_FORGIVENESS){
          // The blade hasn't been anywhere near here since more than one push-release ago —
          // a genuine revisit, not just resuming forward progress with a fresh grip on the pad.
          wastedStrokes++;
        }
      }
      lastTouchedStroke.set(key, moveStrokeId);
    }

    // release bubbles from cleared cells in a single pass instead of re-scanning
    // the whole bubbles array once per swept cell — that scaled badly with denser suds
    if(clearedCells.size){
      for(const b of bubbles){
        if(b.state === 'stuck' && clearedCells.has(b.cellR+'_'+b.cellC)){
          b.state = 'falling';
          b.vx = Math.sign(dx) * (0.25 + Math.random()*0.35) + (Math.random()-0.5)*0.3;
          // bubbles released near the top of the glass have farther to fall, so give them
          // a head start on speed instead of relying on gravity alone to catch them up
          const topBoost = (1 - b.cellR/(ROWS-1)) * 0.9;
          b.vy = 1.3 + Math.random()*0.4 + topBoost;
        }
      }
    }

    // the moving blade can also re-engage suds that are already falling — a swipe
    // back through a drop's path knocks it along, not just a one-time release
    if(currentTool === 'squeegee'){
      const BLADE_HIT_RADIUS = 9;
      for(const b of bubbles){
        if(b.state !== 'falling') continue;
        if(distToSegment(b.x, b.y, p1.x, p1.y, p2.x, p2.y) < BLADE_HIT_RADIUS){
          b.vx += Math.sign(dx) * (0.6 + Math.random()*0.5) + (Math.random()-0.5)*0.3;
          b.vy = Math.max(b.vy * 0.35, 0.15);
        }
      }
    }

    updateHud();
  }

  function distToSegment(px,py,x1,y1,x2,y2){
    const dx = x2-x1, dy = y2-y1;
    const lenSq = dx*dx + dy*dy;
    let t = lenSq === 0 ? 0 : ((px-x1)*dx + (py-y1)*dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t*dx, cy = y1 + t*dy;
    const ddx = px-cx, ddy = py-cy;
    return Math.sqrt(ddx*ddx + ddy*ddy);
  }

  const GRAVITY = 0.09;
  const TERMINAL_VY = 5.5;

  function updateBubbles(){
    for(let i=bubbles.length-1;i>=0;i--){
      const b = bubbles[i];
      if(b.state !== 'falling') continue;
      b.vy = Math.min(TERMINAL_VY, b.vy + GRAVITY);
      b.vx *= 0.94;
      b.x += b.vx;
      b.y += b.vy;
      b.alpha -= 0.004;
      if(b.y - b.r > GH || b.alpha <= 0){
        bubbles.splice(i,1);
      }
    }
    // falling suds close together coalesce into one bigger drop, like real runoff
    for(let i=0;i<bubbles.length;i++){
      const a = bubbles[i];
      if(a.state !== 'falling') continue;
      for(let j=bubbles.length-1;j>i;j--){
        const b = bubbles[j];
        if(b.state !== 'falling') continue;
        const ddx = a.x-b.x, ddy = a.y-b.y;
        if(Math.sqrt(ddx*ddx+ddy*ddy) < (a.r+b.r)*0.55){
          const areaA = a.r*a.r, areaB = b.r*b.r;
          a.x = (a.x*areaA + b.x*areaB)/(areaA+areaB);
          a.y = (a.y*areaA + b.y*areaB)/(areaA+areaB);
          a.vy = Math.max(a.vy, b.vy);
          a.vx = (a.vx + b.vx)/2;
          a.r = Math.min(6.5, Math.sqrt(areaA+areaB));
          a.alpha = Math.max(a.alpha, b.alpha);
          bubbles.splice(j,1);
        }
      }
    }
  }

  function drawFallingBubble(ctx, b){
    ctx.save();
    ctx.globalAlpha = Math.max(0, b.alpha);
    const trailLen = 6 + b.vy*4;
    const grad = ctx.createLinearGradient(b.x, b.y-trailLen, b.x, b.y);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(1, 'rgba(255,255,255,0.8)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(1, b.r*0.8);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y-trailLen);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();

    // same coral-to-mint look as a stuck bubble, so falling suds don't change color on release
    const headGrad = ctx.createRadialGradient(b.x-b.r*0.3, b.y-b.r*0.3, 0, b.x, b.y, b.r);
    headGrad.addColorStop(0, 'rgba(255,200,200,0.5)');
    headGrad.addColorStop(0.5, 'rgba(200,180,220,0.4)');
    headGrad.addColorStop(1, 'rgba(158,217,192,0.3)');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.35, b.y-b.r*0.35, b.r*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  const CLOSEOUT_ANGLE_TOL = 6;   // degrees of tilt still considered "perpendicular"
  const CLOSEOUT_Y_FRAC = 0.82;   // how far down the glass the visual zone band starts (feedback only)
  const CLOSEOUT_TRIGGER_Y_FRAC = 0.95; // how close to the true bottom edge is required to actually fire
  let inCloseoutZone = false;     // true when S is in the visual band — drives the glow
  let inCloseoutTrigger = false;  // true only once S has actually reached the true bottom edge

  function updateHud(){
    document.getElementById('bananaCount').textContent = bananaCount;
    const isPerpendicular = Math.abs(angleDeg) < CLOSEOUT_ANGLE_TOL;
    inCloseoutZone = isPerpendicular && sy >= GH * CLOSEOUT_Y_FRAC;
    inCloseoutTrigger = isPerpendicular && sy >= GH * CLOSEOUT_TRIGGER_Y_FRAC;
    if(inCloseoutTrigger && currentTool === 'squeegee' && !windowComplete){
      windowComplete = true;
      bananaCount += 3;
      document.getElementById('bananaCount').textContent = bananaCount;

      const totalStrokes = usefulStrokes + wastedStrokes;
      const efficiency = totalStrokes > 0 ? Math.round(usefulStrokes/totalStrokes*100) : 100;
      let missedSlots = 0;
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ if(suds[r][c]>0) missedSlots++; }
      const elapsedSeconds = squeegeeStartTime !== null ? (performance.now() - squeegeeStartTime) / 1000 : 0;
      const GRACE_SECONDS = 15; // first 15s of squeegeeing are free
      const timePenalty = Math.floor(Math.max(0, elapsedSeconds - GRACE_SECONDS) / 3); // -1 per 3s over
      const score = Math.min(99, Math.max(0, efficiency - missedSlots*5 - timePenalty));

      const bananaSrc = document.getElementById('bananaIcon').src;
      const bananaImg = `<img src="${bananaSrc}" style="width:16px;height:16px;vertical-align:-3px;object-fit:contain;">`;
      showToast(`Squeaky clean! ${bananaImg}${bananaImg}${bananaImg}<br><b>Score: ${score}</b>`, true);
      setTimeout(() => showToast('', false), 3600);
    } else if(!windowComplete){
      showToast('', false);
    }
  }

  function showToast(html, on){
    const t = document.getElementById('toast');
    t.innerHTML = html;
    t.classList.toggle('show', on);
  }

  let anglePointerId = null, angleLastX = 0;
  let movePointerId = null, moveLastX = 0, moveLastY = 0;

  function isLandscape(){
    return window.matchMedia('(orientation: landscape)').matches;
  }

  function layout(){
    const landscape = isLandscape();

    if(landscape){
      GW = 620; GH = 125;
      TW = 560; TH = 140;
    } else {
      GW = 440; GH = 310;
      TW = 340; TH = 210;
    }

    glassCanvas.width = GW; glassCanvas.height = GH;
    toggleCanvas.width = TW; toggleCanvas.height = TH;
    BLADE_LEN = GW * BLADE_LEN_RATIO;

    midX = TW/2;
    wheelCx = midX/2; wheelCy = TH/2;
    CAP_W = midX - 40;
    CAP_H = Math.min(52, TH*0.32);

    padLeft = midX + ZONE_GAP; padRight = TW - 14;
    const padVInset = TH * 0.22;
    padTop = padVInset; padBottom = TH - padVInset;
    padCx = (padLeft+padRight)/2; padCy = (padTop+padBottom)/2;

    // scale so the pad's actual travel range maps to the glass's actual travel range —
    // the dot bottoming out should coincide with S reaching its own limit, not before
    const glassMargin = 10;
    const padTravelX = (padRight-padLeft) - 2*14;   // minus the pad's own dot radius margin
    const padTravelY = (padBottom-padTop) - 2*14;
    const glassTravelX = GW - 2*glassMargin;
    const glassTravelY = GH - 2*glassMargin;
    SM_SCALE_X = glassTravelX / padTravelX;
    SM_SCALE_Y = glassTravelY / padTravelY;

    // reset live state that depended on the old dimensions
    sx = GW/2; sy = GH/2;
    padVx = padCx; padVy = padCy;
    anglePointerId = null; movePointerId = null;
    renderToolIcons();
    newWindow();
  }

  function bladeEndpoints(x,y,deg){
    const rad = deg*Math.PI/180;
    const dx = Math.cos(rad)*BLADE_LEN/2;
    const dy = Math.sin(rad)*BLADE_LEN/2;
    return [{x:x-dx,y:y-dy},{x:x+dx,y:y+dy}];
  }

  function clampPad(px,py){
    const r = 14;
    const x = Math.min(padRight-r, Math.max(padLeft+r, px));
    const y = Math.min(padBottom-r, Math.max(padTop+r, py));
    return {x,y};
  }

  function clampGlass(px,py){
    const rad = angleDeg*Math.PI/180;
    const halfDx = Math.abs(Math.cos(rad))*BLADE_LEN/2;
    const halfDy = Math.abs(Math.sin(rad))*BLADE_LEN/2;
    const margin = 10;
    const x = Math.min(GW-margin-halfDx, Math.max(margin+halfDx, px));
    const y = Math.min(GH-margin-halfDy, Math.max(margin+halfDy, py));
    return {x,y};
  }

  function toLocal(canvas,evt){
    const rect = canvas.getBoundingClientRect();
    const cx = evt.clientX - rect.left;
    const cy = evt.clientY - rect.top;
    return {x: cx*(canvas.width/rect.width), y: cy*(canvas.height/rect.height)};
  }

  toggleCanvas.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    if(windowComplete) return;
    const p = toLocal(toggleCanvas,e);
    if(p.x < midX && anglePointerId === null){
      anglePointerId = e.pointerId;
      angleLastX = p.x;
      try { toggleCanvas.setPointerCapture(e.pointerId); } catch(err) {}
    } else if(p.x >= midX && movePointerId === null){
      movePointerId = e.pointerId;
      moveLastX = p.x; moveLastY = p.y;
      moveStrokeId++;
      try { toggleCanvas.setPointerCapture(e.pointerId); } catch(err) {}
    }
  }, {passive:false});

  toggleCanvas.addEventListener('pointermove', (e)=>{
    e.preventDefault();
    if(windowComplete) return;
    const p = toLocal(toggleCanvas,e);
    if(e.pointerId === anglePointerId){
      const dx = p.x - angleLastX;
      const delta = dx * PIXELS_TO_DEG;
      spinTotal += delta;
      angleDeg = Math.max(-ANGLE_LIMIT, Math.min(ANGLE_LIMIT, angleDeg + delta*SENSITIVITY));
      angleLastX = p.x;
    } else if(e.pointerId === movePointerId){
      const dx = p.x - moveLastX, dy = p.y - moveLastY;
      const padClamped = clampPad(padVx+dx, padVy+dy);
      padVx = padClamped.x; padVy = padClamped.y;
      const clamped = clampGlass(sx+dx*SM_SCALE_X, sy+dy*SM_SCALE_Y);
      sx = clamped.x; sy = clamped.y;
      moveLastX = p.x; moveLastY = p.y;
    }
  }, {passive:false});

  ['pointerup','pointerleave','pointercancel'].forEach(evt=>{
    toggleCanvas.addEventListener(evt, (e)=>{
      e.preventDefault();
      if(e.pointerId === anglePointerId) anglePointerId = null;
      if(e.pointerId === movePointerId){
        movePointerId = null;
      }
    }, {passive:false});
  });
  toggleCanvas.addEventListener('touchstart', (e)=>e.preventDefault(), {passive:false});
  toggleCanvas.addEventListener('touchmove', (e)=>e.preventDefault(), {passive:false});

  function drawSudsBubble(ctx, x, y, r){
    // Gradient from coral to mint
    const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, 0, x, y, r);
    grad.addColorStop(0, 'rgba(255,200,200,0.5)');
    grad.addColorStop(0.5, 'rgba(200,180,220,0.4)');
    grad.addColorStop(1, 'rgba(158,217,192,0.3)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
    
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(x-r*0.35, y-r*0.35, r*0.3, 0, Math.PI*2);
    ctx.fill();
  }

  function drawBubble(ctx,x,y,r,alpha){
    ctx.save();
    ctx.globalAlpha = alpha;

    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.closePath();

    // diagonal coral-to-mint tint, cream through the middle
    const lg = ctx.createLinearGradient(x-r,y-r,x+r,y+r);
    lg.addColorStop(0,   'rgba(158,217,192,0.55)');
    lg.addColorStop(0.5, 'rgba(246,236,222,0.4)');
    lg.addColorStop(1,   'rgba(245,110,100,0.55)');
    ctx.fillStyle = lg;
    ctx.fill();

    ctx.save();
    ctx.clip();
    // soft glossy sheen
    const rg = ctx.createRadialGradient(x-r*0.3,y-r*0.35,0, x-r*0.3,y-r*0.35, r*1.3);
    rg.addColorStop(0,'rgba(255,255,255,0.55)');
    rg.addColorStop(0.4,'rgba(255,255,255,0.12)');
    rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(x-r,y-r,r*2,r*2);
    ctx.restore();

    // main highlight streak
    ctx.save();
    ctx.translate(x - r*0.3, y - r*0.35);
    ctx.rotate(-0.5);
    ctx.scale(1.6,0.7);
    ctx.beginPath();
    ctx.arc(0,0,r*0.35,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fill();
    ctx.restore();

    // secondary highlight dot
    ctx.beginPath();
    ctx.arc(x+r*0.35, y+r*0.3, r*0.15, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    // thin rim
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.lineWidth = Math.max(0.6, r*0.06);
    ctx.strokeStyle = 'rgba(220,150,140,0.5)';
    ctx.stroke();

    ctx.restore();
  }

  function drawGlass(){
    gctx.clearRect(0,0,GW,GH);

    // dirty glass is cream; each cell turns gray the first time the squeegee wipes it
    const gcw = GW/COLS, gch = GH/ROWS;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        gctx.fillStyle = cleaned[r][c] ? '#EDEDED' : '#F6ECDE';
        gctx.fillRect(c*gcw, r*gch, gcw+1, gch+1);
      }
    }

    // logo etched on the glass like a decal on a door — always visible, on top of dirt or clean alike
    if(logoReady){
      gctx.save();
      gctx.globalAlpha = 0.4;
      const pad = GW*0.1;
      const scale = Math.min((GW-pad*2)/logoImg.naturalWidth, (GH-pad*2)/logoImg.naturalHeight);
      const dw = logoImg.naturalWidth*scale, dh = logoImg.naturalHeight*scale;
      gctx.drawImage(logoImg, (GW-dw)/2, (GH-dh)/2, dw, dh);
      gctx.restore();
    }

    gctx.save();
    gctx.strokeStyle = 'rgba(255,255,255,.5)';
    gctx.lineWidth = 3;
    gctx.strokeRect(4,4,GW-8,GH-8);
    gctx.restore();

    // every suds bubble is a tracked object: 'stuck' ones sit where they were applied,
    // 'falling' ones were just released by the squeegee and obey gravity/drawFallingBubble
    for(const b of bubbles){
      if(b.state === 'falling'){
        drawFallingBubble(gctx, b);
      } else {
        drawSudsBubble(gctx, b.x, b.y, b.r);
      }
    }

    if(currentTool === 'applicator'){
      drawApplicatorTool(gctx, sx, sy, angleDeg);
    } else {
      drawSqueegeeTool(gctx, sx, sy, angleDeg);
    }
  }

  // shared by the live glass canvas and the button icons, so the icons are never
  // a separate approximation — same code, just called at a smaller scale
  function drawApplicatorTool(ctx, x, y, angleDeg){
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate((angleDeg * Math.PI) / 180);

    const foamW = GW * 0.28;  // Same span as squeegee blade
    const foamH = 16;

    const foamGrad = ctx.createLinearGradient(-foamW/2, 0, foamW/2, 0);
    foamGrad.addColorStop(0, '#9ED9C0');   // mint
    foamGrad.addColorStop(1, '#F56E64');   // coral

    ctx.fillStyle = foamGrad;
    ctx.fillRect(-foamW/2, -foamH/2, foamW, foamH);

    ctx.fillStyle = foamGrad;
    ctx.beginPath();
    ctx.arc(-foamW/2, 0, foamH/2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(foamW/2, 0, foamH/2, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for(let px = -foamW/2 + 4; px < foamW/2; px += 4){
      for(let py = -foamH/2 + 3; py < foamH/2; py += 4){
        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    ctx.fillStyle = '#1b1b1b';
    ctx.fillRect(-5, foamH/2, 10, 20);

    ctx.fillStyle = '#9ED9C0';
    ctx.beginPath();
    ctx.arc(0, foamH/2 + 20, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawSqueegeeTool(ctx, x, y, angleDeg){
    const [p1,p2] = bladeEndpoints(x, y, angleDeg);
    ctx.save();

    const bladeGrad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    bladeGrad.addColorStop(0, '#9ED9C0');   // mint
    bladeGrad.addColorStop(1, '#F56E64');   // coral

    ctx.strokeStyle = '#2b2b2b';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    ctx.strokeStyle = '#b7bfc7';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    ctx.strokeStyle = bladeGrad;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    ctx.strokeStyle = '#F56E64';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x, y+22);
    ctx.stroke();
    ctx.fillStyle = '#F56E64';
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawToggle(){
    tctx.clearRect(0,0,TW,TH);
    tctx.save();

    tctx.strokeStyle = 'rgba(255,255,255,0.12)';
    tctx.lineWidth = 1;
    tctx.beginPath();
    tctx.moveTo(midX, 10);
    tctx.lineTo(midX, TH-10);
    tctx.stroke();

    tctx.fillStyle = 'rgba(245,110,100,0.75)';
    tctx.font = '10px Georgia';
    tctx.textAlign = 'center';
    tctx.fillText('ANGLE', wheelCx, 18);
    tctx.fillStyle = 'rgba(158,217,192,0.85)';
    tctx.fillText('MOVE', padCx, 18);

    // ---- left zone: angle wheel, profile view ----
    const left = wheelCx - CAP_W/2, right = wheelCx + CAP_W/2;
    const top = wheelCy - CAP_H/2, bottom = wheelCy + CAP_H/2;
    const r = CAP_H/2;
    const angleActive = anglePointerId !== null || keysDown.left !== keysDown.right;

    const bodyGrad = tctx.createLinearGradient(0, top, 0, bottom);
    const alpha1 = angleActive ? 0.5 : 0.14;
    bodyGrad.addColorStop(0,   `rgba(245,110,100,${alpha1*0.5})`);
    bodyGrad.addColorStop(0.5, `rgba(245,110,100,${alpha1})`);
    bodyGrad.addColorStop(1,   `rgba(0,0,0,${alpha1*0.6})`);

    tctx.beginPath();
    tctx.moveTo(left+r, top);
    tctx.lineTo(right-r, top);
    tctx.arc(right-r, wheelCy, r, -Math.PI/2, Math.PI/2);
    tctx.lineTo(left+r, bottom);
    tctx.arc(left+r, wheelCy, r, Math.PI/2, -Math.PI/2);
    tctx.closePath();
    tctx.fillStyle = bodyGrad;
    tctx.fill();
    tctx.lineWidth = 2.5;
    tctx.strokeStyle = '#F56E64';
    tctx.stroke();

    tctx.save();
    tctx.clip();
    const spacing = 16;
    const offset = ((spinTotal * 1.4) % spacing + spacing) % spacing;
    tctx.strokeStyle = 'rgba(246,236,222,0.6)';
    tctx.lineWidth = 3;
    for(let x = left - spacing + offset; x < right + spacing; x += spacing){
      const distFromCenter = Math.abs(x - wheelCx) / (CAP_W/2);
      const fade = Math.max(0, 1 - Math.pow(distFromCenter, 2.2));
      tctx.globalAlpha = fade;
      tctx.beginPath();
      tctx.moveTo(x, top+8);
      tctx.lineTo(x, bottom-8);
      tctx.stroke();
    }
    tctx.restore();

    // ---- right zone: XY move pad ----
    const moveActive = movePointerId !== null;
    tctx.fillStyle = moveActive ? 'rgba(158,217,192,0.22)' : 'rgba(255,255,255,0.04)';
    tctx.strokeStyle = '#9ED9C0';
    tctx.lineWidth = 2;
    const padR = 8;
    tctx.beginPath();
    tctx.moveTo(padLeft+padR, padTop);
    tctx.lineTo(padRight-padR, padTop);
    tctx.arcTo(padRight, padTop, padRight, padTop+padR, padR);
    tctx.lineTo(padRight, padBottom-padR);
    tctx.arcTo(padRight, padBottom, padRight-padR, padBottom, padR);
    tctx.lineTo(padLeft+padR, padBottom);
    tctx.arcTo(padLeft, padBottom, padLeft, padBottom-padR, padR);
    tctx.lineTo(padLeft, padTop+padR);
    tctx.arcTo(padLeft, padTop, padLeft+padR, padTop, padR);
    tctx.closePath();
    tctx.fill();
    tctx.stroke();

    tctx.fillStyle = moveActive ? '#F6ECDE' : 'rgba(246,236,222,0.35)';
    tctx.beginPath();
    tctx.arc(padVx, padVy, 9, 0, Math.PI*2);
    tctx.fill();

    tctx.restore();
  }

  // ---- keyboard support (PC has no second finger, but it has a keyboard) ----
  // Hold Left/Right (or A/D) to rotate — works at the same time as dragging the move pad with the mouse.
  const KEY_DEG_PER_FRAME = 1.1;
  const keysDown = {left:false, right:false};

  window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A'){ keysDown.left = true; e.preventDefault(); }
    if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){ keysDown.right = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', (e)=>{
    if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A'){ keysDown.left = false; }
    if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){ keysDown.right = false; }
  });
  // if the mouse is actively dragging the angle zone, let it take priority over the keyboard
  function applyKeyboardAngle(){
    if(windowComplete) return;
    if(anglePointerId !== null) return;
    if(keysDown.left === keysDown.right) return; // neither or both held — no net input
    const delta = (keysDown.right ? 1 : -1) * KEY_DEG_PER_FRAME;
    spinTotal += delta;
    angleDeg = Math.max(-ANGLE_LIMIT, Math.min(ANGLE_LIMIT, angleDeg + delta*SENSITIVITY));
  }

  function loop(){
    applyKeyboardAngle();
    sweepBlade(); // also refreshes the HUD, but only when something actually moved
    updateBubbles();
    drawGlass();
    drawToggle();
    requestAnimationFrame(loop);
  }

  document.getElementById('resetBtn').addEventListener('click', newWindow);

  document.getElementById('applicatorBtn').addEventListener('click', ()=>{
    currentTool = 'applicator';
    document.getElementById('applicatorBtn').style.border = '3px solid #A6382E';
    document.getElementById('squeegeeBtn').style.border = '3px solid #F56E64';
  });

  document.getElementById('squeegeeBtn').addEventListener('click', ()=>{
    currentTool = 'squeegee';
    if(squeegeeStartTime === null) squeegeeStartTime = performance.now();
    document.getElementById('squeegeeBtn').style.border = '3px solid #A6382E';
    document.getElementById('applicatorBtn').style.border = '3px solid #F56E64';
  });

  let resizeTimer = null;
  function onOrientationChange(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layout, 80); // small debounce while the browser finishes rotating
  }
  window.addEventListener('resize', onOrientationChange);
  if(window.matchMedia){
    window.matchMedia('(orientation: landscape)').addEventListener('change', onOrientationChange);
  }

  layout();
  loop();
})();
</script>
</body>
</html>
