<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Sandbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #F56E64; --orangelight: #F6ECDE; --orangeborder: #F56E64;
    --mint: #9ED9C0; --cream: #F6ECDE;
    --white: #FFFFFF; --dark: #A6382E; --mid: #7C7268; --radius: 20px;
  }
  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .pkg {
    background: var(--white);
    border: 1.5px solid var(--orangeborder);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(245,110,100,0.10);
    width: 100%;
    max-width: 360px;
  }

  /* ── HERO GRADIENT — swap these out to experiment ── */

  /* Option A: Orange sunrise (warm, energetic) */
  .pkg-hero { background: linear-gradient(160deg, #FFCBA4 0%, #F56E64 100%); }

  /* Option B: Mint (original) */
  /* .pkg-hero { background: linear-gradient(180deg, #B8E6D5 0%, #9ED9C0 100%); } */

  /* Option C: Cream to orange */
  /* .pkg-hero { background: linear-gradient(160deg, #F6ECDE 0%, #F56E64 100%); } */

  /* Option D: Orange to mint */
  /* .pkg-hero { background: linear-gradient(135deg, #F56E64 0%, #9ED9C0 100%); } */

  /* Option E: Soft peach */
  /* .pkg-hero { background: linear-gradient(180deg, #FFF0E8 0%, #FFCBA4 100%); } */

  .pkg-hero {
    padding: 28px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .pkg-badge { position: absolute; top: 12px; right: 14px; font-size: 12px; font-weight: 700; color: var(--white); }
  .animal-circle {
    width: 90px; height: 90px; border-radius: 50%;
    background: white; border: 3px solid rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15); overflow: hidden;
    font-size: 44px;
  }

  .pkg-body { padding: 20px 24px 24px; }
  .pkg-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; color: var(--dark); text-align: center; margin-bottom: 4px; }
  .pkg-starting { font-size: 13px; color: var(--mid); text-align: center; margin-bottom: 2px; }
  .pkg-amount { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 52px; color: var(--dark); text-align: center; line-height: 1; margin-bottom: 20px; position: relative; }
  .pkg-amount .dollar { font-size: 28px; vertical-align: super; }
  .member-price { text-align: center; font-size: 12.5px; color: var(--mid); margin-top: -14px; margin-bottom: 18px; }
  .member-price .member-amt { font-weight: 700; color: #B5AC9E; }

  .pkg-features { list-style: none; margin: 0 auto 20px; width: max-content; max-width: 100%; }
  .pkg-features li { font-size: 14px; color: var(--mid); padding: 4px 0 4px 20px; text-align: left; position: relative; }
  .pkg-features li::before { content: "✦"; position: absolute; left: 0; font-size: 10px; color: var(--orange); top: 5px; }
  .pkg-features li:first-child { font-weight: 600; color: var(--orange); text-align: center; padding-left: 0; margin-bottom: 2px; }
  .pkg-features li:first-child::before { display: none; }

  .pkg-btn { display: block; width: 100%; padding: 14px 0; border-radius: 50px; border: none; background: var(--orange); color: var(--white); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; transition: opacity 0.15s; }
  .pkg-btn:hover { opacity: 0.88; }

  /* Gradient label */
  .label { text-align: center; font-size: 12px; color: var(--mid); margin-bottom: 16px; font-style: italic; }
</style>
</head>
<body>

<div style="width:100%;max-width:360px;">
  <p class="label">Edit .pkg-hero in the CSS to swap gradients</p>

  <div class="pkg">
    <div class="pkg-hero">
      <span class="pkg-badge">Most Popular</span>
      <div class="animal-circle">🐒</div>
    </div>
    <div class="pkg-body">
      <div class="pkg-name">Light Lemur</div>
      <div class="pkg-starting">starting at</div>
      <div class="pkg-amount"><span class="dollar">$</span>189</div>
      <div class="member-price">🔒 Members: <span class="member-amt">$151</span></div>
      <ul class="pkg-features">
        <li>What's included</li>
        <li>Exterior windows</li>
        <li>Interior windows</li>
        <li>Screen brushing</li>
        <li>Sill wipe-down</li>
      </ul>
      <button class="pkg-btn">Select Package</button>
    </div>
  </div>
</div>

</body>
</html>
