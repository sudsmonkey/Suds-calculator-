<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suds Monkey — Book Your Clean</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F56E64;
    --orangeborder: #F0A9A5;
    --mint: #9ED9C0;
    --cream: #FDF9F5;
    --dark: #A6382E;
    --mid: #7C7268;
    --white: #FFFFFF;
    --radius: 20px;
    --shadow: 0 2px 16px rgba(245,110,100,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; }

  .header { background: var(--orange); padding: 20px 24px 28px; text-align: center; }
  .header-logo { width: 70px; height: 70px; border-radius: 50%; background: #F7F1EC; border: 3px solid var(--mint); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; overflow: hidden; }
  .header-logo img { width: 100%; height: 100%; object-fit: cover; }
  .header h1 { color: #fff; font-size: 22px; font-weight: 900; }
  .header p { color: rgba(255,255,255,0.85); font-size: 13px; margin-top: 4px; }
  .pkg-pill { background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50px; padding: 8px 16px; display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; }
  .pkg-pill span { color: #fff; font-size: 13px; font-weight: 700; }
  .pkg-pill .pkg-price { background: #fff; color: var(--dark); border-radius: 50px; padding: 2px 10px; font-size: 12px; font-weight: 900; }

  .content { padding: 20px 16px 40px; max-width: 440px; margin: 0 auto; }
  .section-label { font-size: 11px; font-weight: 900; color: var(--mid); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; margin-top: 24px; }
  .section-label:first-child { margin-top: 0; }

  /* Calendar */
  .calendar-card { background: var(--white); border: 1.5px solid var(--orangeborder); border-radius: var(--radius); box-shadow: var(--shadow); }
  .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid #F5EDE4; }
  .month-nav button { background: none; border: none; cursor: pointer; color: var(--orange); font-size: 22px; font-weight: 900; padding: 4px 10px; border-radius: 8px; transition: background 0.15s; line-height: 1; }
  .month-nav button:hover { background: #FDF0EF; }
  .month-name { font-size: 17px; font-weight: 900; color: var(--dark); }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 12px 4px; }
  .day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--mid); letter-spacing: 0.05em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 4px 12px 16px; }
  .cal-day { width: 100%; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--dark); position: relative; }
  .cal-day:hover:not(.disabled):not(.empty) { background: #FDF0EF; }
  .cal-day.empty, .cal-day.disabled { cursor: default; }
  .cal-day.disabled { color: #DDD3C4; }
  .cal-day.selected { background: var(--orange) !important; color: #fff; }
  .cal-day.today { border: 2px solid var(--mint); }
  .cal-day.has-slots::after { content: ''; display: block; width: 4px; height: 4px; background: var(--mint); border-radius: 50%; position: absolute; bottom: 3px; }


  /* Time slots */
  .time-card { background: var(--white); border: 1.5px solid var(--orangeborder); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .time-slot { border: 1.5px solid var(--orangeborder); border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .time-slot:hover:not(.booked) { border-color: var(--orange); background: #FDF0EF; }
  .time-slot.selected { background: var(--orange); border-color: var(--orange); }
  .time-slot.selected .time-main { color: #fff; }
  .time-slot.selected .time-sub { color: rgba(255,255,255,0.8); }
  .time-slot.booked { background: #F5EDE4; border-color: #DDD3C4; cursor: not-allowed; opacity: 0.5; }
  .time-main { font-size: 15px; font-weight: 900; color: var(--dark); }
  .time-sub { font-size: 11px; color: var(--mid); margin-top: 2px; }

  /* Info form */
  .info-card { background: var(--white); border: 1.5px solid var(--orangeborder); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .info-row { display: flex; flex-direction: column; gap: 10px; }
  .info-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-field label { font-size: 11px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .info-field input, .info-field textarea { width: 100%; border: 1.5px solid #DDD3C4; border-radius: 10px; padding: 10px 12px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--dark); background: var(--cream); outline: none; transition: border 0.15s; }
  .info-field input:focus, .info-field textarea:focus { border-color: var(--orange); }
  .info-field textarea { resize: none; height: 70px; }

  /* Summary */
  .summary-card { background: var(--white); border: 1.5px solid var(--orangeborder); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #F5EDE4; font-size: 14px; }
  .summary-row:last-child { border-bottom: none; padding-top: 10px; }
  .summary-row .label { color: var(--mid); }
  .summary-row .value { font-weight: 700; color: var(--dark); }
  .summary-row.total .label { font-weight: 900; color: var(--dark); font-size: 15px; }
  .summary-row.total .value { font-size: 18px; font-weight: 900; color: var(--orange); }


  .book-btn { display: block; width: 100%; padding: 16px; border-radius: 50px; border: none; background: var(--orange); color: #fff; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; margin-top: 20px; transition: opacity 0.15s; }
  .book-btn:hover { opacity: 0.88; }
  .book-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SLOTS = ['8:00 AM','10:00 AM','12:00 PM','2:00 PM'];
  const BOOKED = {
    '2026-07-10': ['8:00 AM','10:00 AM'],
    '2026-07-15': ['12:00 PM']
  };

  const today = new Date();
  today.setHours(0,0,0,0);

  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null;
  let selectedTime = null;

  function renderCalendar() {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    document.getElementById('monthName').textContent = MONTHS[currentMonth] + ' ' + currentYear;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= totalDays; d++) {
      const date = new Date(currentYear, currentMonth, d);
      date.setHours(0,0,0,0);
      const dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const dow = date.getDay();
      const isPast = date < today;
      const isWeekend = dow === 0 || dow === 6;
      const fullyBooked = BOOKED[dateStr] && BOOKED[dateStr].length >= SLOTS.length;

      const el = document.createElement('div');

      if (isPast || isWeekend || fullyBooked) {
        el.className = 'cal-day disabled';
      } else {
        el.className = 'cal-day has-slots';
        el.onclick = () => selectDate(dateStr, d);
      }

      if (date.getTime() === today.getTime()) el.classList.add('today');
      if (dateStr === selectedDate) el.classList.add('selected');

      el.textContent = d;
      grid.appendChild(el);
    }
  }

  function selectDate(dateStr, d) {
    selectedDate = dateStr;
    selectedTime = null;
    renderCalendar();
    renderTimeSlots();
    updateBtn();
    setTimeout(() => {
      document.getElementById('timeSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function renderTimeSlots() {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';
    if (!selectedDate) {
      grid.style.gridTemplateColumns = '1fr';
      grid.innerHTML = '<div style="text-align:center;padding:20px;color:var(--mid);font-size:14px;font-weight:700;">Select a date above to see available times</div>';
      return;
    }
    grid.style.gridTemplateColumns = '1fr 1fr';
    const booked = BOOKED[selectedDate] || [];
    SLOTS.forEach(slot => {
      const el = document.createElement('div');
      if (booked.includes(slot)) {
        el.className = 'time-slot booked';
        el.innerHTML = '<div class="time-main">' + slot + '</div><div class="time-sub">Unavailable</div>';
      } else {
        el.className = 'time-slot' + (selectedTime === slot ? ' selected' : '');
        el.innerHTML = '<div class="time-main">' + slot + '</div><div class="time-sub">~3 hrs</div>';
        el.onclick = () => selectTime(slot);
      }
      grid.appendChild(el);
    });
  }

  function selectTime(slot) {
    selectedTime = slot;
    document.getElementById('summaryDate').textContent = MONTHS[currentMonth] + ' ' + parseInt(selectedDate.split('-')[2]) + ', ' + currentYear;
    document.getElementById('summaryTime').textContent = slot;
    renderTimeSlots();
    updateBtn();
  }

  function updateBtn() {
    document.getElementById('bookBtn').disabled = !(selectedDate && selectedTime);
  }

  function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  renderCalendar();
  renderTimeSlots();
</script>
</body>
</html>
