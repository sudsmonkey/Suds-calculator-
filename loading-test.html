<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Test</title>
<style>
  body { font-family: 'Nunito', sans-serif; background: #FDF9F5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
  .calib-spinner { display: flex; gap: 10px; justify-content: center; }
  .calib-spinner span { width: 13px; height: 13px; border-radius: 50%; background: #F08080; }
  .calib-spinner span:nth-child(2) { background: #9ED9C0; }
  .calib-spinner span:nth-child(4) { background: #9ED9C0; }
  h2 { font-family: sans-serif; color: #A6382E; margin: 0; }
  #allSet { display: none; font-size: 14px; font-weight: 700; color: #3d3530; }
  button { padding: 10px 28px; background: #F08080; color: #fff; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h2>Calibrating Suds</h2>
<div class="calib-spinner">
  <span></span><span></span><span></span><span></span><span></span>
</div>
<p id="allSet">All set! Toggle the slider to explore your estimate.</p>
<button onclick="runDemo()">&#9654; Run Again</button>
<small style="color:#aaa">v11 — hold timings</small>

<script>
  let rafId = null;
  const timers = [];

  function runDemo() {
    // Cancel any running animation
    if (rafId) cancelAnimationFrame(rafId);
    timers.forEach(clearTimeout);
    timers.length = 0;

    const dots = Array.from(document.querySelectorAll('.calib-spinner span'));
    document.getElementById('allSet').style.display = 'none';
    dots.forEach(d => { d.style.transform = ''; d.style.opacity = ''; });

    const BASE_PERIOD = 840;
    const initPhases = [0, 0.875, 0.75, 0.625, 0.5];
    const phases = initPhases.slice();
    const freqs = dots.map(() => 1 / BASE_PERIOD);
    const locked = new Array(5).fill(false);
    const lockTimes = new Array(5).fill(null);
    let lastNow = null;
    const RAMP = 1.2;

    function dotScale(p) {
      const t = ((p % 1) + 1) % 1;
      if (t < 0.4) return 0.6 + 0.65 * (t / 0.4);
      if (t < 0.8) return 1.25 - 0.65 * ((t - 0.4) / 0.4);
      return 0.6;
    }
    function ease(p) { return p < 0.5 ? 2*p*p : -1+(4-2*p)*p; }

    function frame(now) {
      const dt = lastNow ? now - lastNow : 0;
      lastNow = now;
      dots.forEach((dot, i) => {
        if (locked[i]) {
          const p = Math.min((now - lockTimes[i]) / 320, 1);
          const s = 0.6 + 0.4 * ease(p);
          dot.style.transform = `scale(${s.toFixed(3)})`;
          dot.style.opacity = (0.45 + 0.55 * ease(p)).toFixed(3);
        } else {
          phases[i] = (phases[i] + freqs[i] * dt) % 1;
          const s = dotScale(phases[i]);
          dot.style.transform = `scale(${s.toFixed(3)})`;
          dot.style.opacity = (0.45 + ((s - 0.6) / 0.65) * 0.55).toFixed(3);
        }
      });
      rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);

    const lockAt = [2520, 3465, 4410, 5355, 6300];
    lockAt.forEach((t, i) => {
      timers.push(setTimeout(() => {
        locked[i] = true;
        lockTimes[i] = performance.now();
        for (let j = i + 1; j < dots.length; j++) freqs[j] *= RAMP;
        if (i === dots.length - 1) {
          timers.push(setTimeout(() => {
            cancelAnimationFrame(rafId);
            timers.push(setTimeout(() => { document.getElementById('allSet').style.display = 'block'; }, 1100));
          }, 320));
        }
      }, t));
    });
  }

  runDemo();
</script>
</body>
</html>
